<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Terminal | Task 2</title>
    <link rel="stylesheet" href="2.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div class="form-wrapper">
        <div class="contact-card">
            <div class="card-header">
                <h1>CONTACT_US</h1>
                <p>Please fill out the form below to reach our team.</p>
            </div>

            <form id="contactForm" novalidate>
                <div class="input-field">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g. Alex Rivera" required>
                    <small class="error-text" id="nameError">Full name is required.</small>
                </div>

                <div class="input-field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="alex@example.com" required>
                    <small class="error-text" id="emailError">Please enter a valid email address.</small>
                </div>

                <div class="input-field">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" placeholder="How can we help?">
                </div>

                <div class="input-field">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Your message here..." required></textarea>
                    <small class="error-text" id="msgError">Message field cannot be empty.</small>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">SEND MESSAGE</button>
            </form>

            <div id="successMessage" class="hidden success-box">
                <strong>Message Received.</strong> We will get back to you shortly.
            </div>
        </div>
    </div>

    <script src="2.js"></script>
</body>
</html>
